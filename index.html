<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRYPTO FARMING - PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --tg-theme-bg-color: #0f172a; --tg-theme-text-color: #ffffff; --accent: #22c55e; }
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.2rem; }
        .nav-btn { transition: all 0.3s; opacity: 0.5; text-align: center; font-size: 0.7rem; }
        .nav-btn.active { opacity: 1; color: var(--accent); transform: scale(1.1); }
        .hidden { display: none !important; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
        .leaf { position: fixed; top: -50px; pointer-events: none; animation: fall linear forwards; z-index: 50; }
        .admin-section { border-bottom: 1px solid #334155; padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body class="pb-24">

    <div id="userPanel" class="hidden p-4">
        <div class="flex justify-between items-center mb-6 glass-card p-3">
            <div class="flex items-center gap-2">
                <span class="text-xl">💰</span>
                <span id="userBalance" class="font-bold text-lg text-green-400">0</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="text-right">
                    <p id="userName" class="text-xs font-bold truncate w-20">User</p>
                    <p class="text-[10px] text-gray-400">LVL <span id="userLevel">1</span></p>
                </div>
                <img id="userPic" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full border border-green-500">
            </div>
        </div>

        <section id="farmingTab" class="tab-content text-center">
            <div class="relative py-8">
                <img src="https://envs.sh/Gt3.jpg/IMG2025092696.jpg" class="w-44 h-44 rounded-full mx-auto shadow-[0_0_40px_rgba(34,197,94,0.3)] border-4 border-green-500/20">
                <div class="glass-card p-5 mt-8">
                    <div class="flex justify-between text-xs mb-2 text-gray-400">
                        <span>Farming Progress</span>
                        <span id="farmingTimeLeft">24:00:00</span>
                    </div>
                    <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden">
                        <div id="progressBar" class="bg-green-500 h-full w-0 transition-all"></div>
                    </div>
                    <button id="startFarmingBtn" onclick="startFarming()" class="w-full mt-6 bg-green-600 hover:bg-green-500 py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-transform">🍁 START FARMING</button>
                </div>
            </div>
        </section>

        <section id="tasksTab" class="tab-content hidden">
            <h2 class="text-lg font-bold mb-4">Earn Extra Coins</h2>
            <div id="taskList" class="space-y-3">
                </div>
        </section>

        <section id="exchangeTab" class="tab-content hidden">
            <div class="glass-card p-5 mb-4 text-center">
                <h3 class="font-bold mb-3">Withdraw Coins</h3>
                <p class="text-xs text-gray-400 mb-4">1000 Coins = <span id="convRateDisp">₹80</span></p>
                <input type="number" id="coinInput" placeholder="Enter Coins" class="w-full bg-black/40 border border-white/10 p-3 rounded-lg mb-4 text-white">
                <select id="withdrawMethod" class="w-full bg-black/40 p-3 rounded-lg mb-4 border border-white/10 text-white">
                    </select>
                <input type="text" id="walletAddress" placeholder="Payment Details (UPI/Address)" class="w-full bg-black/40 border border-white/10 p-3 rounded-lg mb-4 text-white">
                <button onclick="requestWithdrawal()" class="w-full bg-blue-600 py-3 rounded-lg font-bold">Request Cashout</button>
            </div>
        </section>

        <nav class="fixed bottom-0 left-0 right-0 glass-card mx-4 mb-4 flex justify-around p-3 z-50">
            <button onclick="showTab('farmingTab', this)" class="nav-btn active">🍁<br>Farm</button>
            <button onclick="showTab('tasksTab', this)" class="nav-btn">📝<br>Tasks</button>
            <button onclick="showTab('exchangeTab', this)" class="nav-btn">🏦<br>Cash</button>
        </nav>
    </div>

    <div id="adminPanel" class="hidden min-h-screen bg-slate-900 p-4 text-sm">
        <div id="adminLogin" class="max-w-md mx-auto mt-10 glass-card p-6">
            <h1 class="text-xl font-bold mb-4">Admin Access</h1>
            <input type="email" id="adminEmail" placeholder="Email" class="w-full bg-slate-800 p-3 rounded mb-3 border border-slate-700 outline-none">
            <input type="password" id="adminPass" placeholder="Password" class="w-full bg-slate-800 p-3 rounded mb-4 border border-slate-700 outline-none">
            <button onclick="adminLogin()" class="w-full bg-indigo-600 py-3 rounded font-bold">Verify Identity</button>
        </div>

        <div id="adminDashboard" class="hidden">
            <div class="flex justify-between items-center mb-6 bg-slate-800 p-3 rounded-lg">
                <h2 class="font-bold">ADMIN CONSOLE</h2>
                <button onclick="logout()" class="text-red-400">Logout</button>
            </div>

            <div class="admin-section">
                <h3 class="text-indigo-400 font-bold mb-3">👤 User Management</h3>
                <input type="text" id="searchUid" placeholder="User ID" class="bg-slate-800 p-2 rounded mr-2">
                <button onclick="findUser()" class="bg-slate-700 px-3 py-2 rounded">Find</button>
                <div id="userDetails" class="mt-3 hidden bg-slate-800 p-3 rounded">
                    <p id="detName"></p>
                    <div class="flex gap-2 mt-2">
                        <button onclick="editCoins(1000)" class="bg-green-700 px-2 py-1 rounded">+1k</button>
                        <button onclick="editCoins(-1000)" class="bg-red-700 px-2 py-1 rounded">-1k</button>
                        <button id="banBtn" onclick="toggleBan()" class="bg-orange-700 px-2 py-1 rounded">Ban</button>
                    </div>
                </div>
            </div>

            <div class="admin-section">
                <h3 class="text-indigo-400 font-bold mb-3">💰 Pending Withdrawals</h3>
                <div id="adminWithdrawals" class="space-y-3"></div>
            </div>

            <div class="admin-section">
                <h3 class="text-indigo-400 font-bold mb-3">📝 Add Task</h3>
                <input type="text" id="taskTitle" placeholder="Task Name (e.g. Sub YouTube)" class="w-full bg-slate-800 p-2 rounded mb-2">
                <input type="text" id="taskLink" placeholder="Link" class="w-full bg-slate-800 p-2 rounded mb-2">
                <input type="number" id="taskReward" placeholder="Reward Coins" class="w-full bg-slate-800 p-2 rounded mb-2">
                <button onclick="addTask()" class="bg-blue-600 w-full py-2 rounded">Add New Task</button>
            </div>
            
            <div class="admin-section">
                <h3 class="text-indigo-400 font-bold mb-3">⚙️ Settings</h3>
                <label>Methods (comma separated): <input type="text" id="setMethods" class="w-full bg-slate-800 p-2 rounded"></label>
                <button onclick="updateSettings()" class="bg-green-600 w-full py-2 mt-2 rounded">Save Settings</button>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBVkm1puprYba5H88QWwMH-z1pKRx8QpWo",
            authDomain: "telegram-web-bot-app.firebaseapp.com",
            projectId: "telegram-web-bot-app",
            storageBucket: "telegram-web-bot-app.firebasestorage.app",
            messagingSenderId: "251843820999",
            appId: "1:251843820999:web:771cbc41398523969d2de2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const tg = window.Telegram.WebApp;

        let userData = { coins: 0, xp: 0, level: 1, isFarming: false, lastFarmStart: null, uid: null, isBanned: false };
        let settings = { methods: "UPI,USDT,Paytm", rate: 100, conv: 80 };
        let currentEditingUser = null;

        // --- CORE LOGIC ---
        function initApp() {
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                document.getElementById('userPanel').classList.remove('hidden');
                loadUserData(tg.initDataUnsafe.user.id);
                loadSettings();
                loadTasks();
            } else {
                document.getElementById('adminPanel').classList.remove('hidden');
            }
            tg.expand();
            initFarmingLoop();
        }

        async function loadSettings() {
            const doc = await db.collection('settings').doc('global').get();
            if(doc.exists) {
                settings = doc.data();
                document.getElementById('convRateDisp').innerText = `₹${settings.conv}`;
                const mSelect = document.getElementById('withdrawMethod');
                mSelect.innerHTML = settings.methods.split(',').map(m => `<option value="${m}">${m}</option>`).join('');
            }
        }

        async function loadUserData(uid) {
            const doc = await db.collection('users').doc(uid.toString()).get();
            if(doc.exists) {
                userData = doc.data();
                if(userData.isBanned) {
                    document.body.innerHTML = "<h1 class='text-center mt-20 text-red-500'>YOU ARE BANNED!</h1>";
                    return;
                }
            } else {
                userData.uid = uid;
                userData.name = tg.initDataUnsafe.user.first_name;
                await db.collection('users').doc(uid.toString()).set(userData);
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('userBalance').innerText = Math.floor(userData.coins);
            document.getElementById('userName').innerText = userData.name || "User";
            document.getElementById('userLevel').innerText = userData.level;
            if(userData.isFarming) {
                document.getElementById('startFarmingBtn').innerText = "FARMING...";
                document.getElementById('startFarmingBtn').disabled = true;
                startLeafAnimation();
            }
        }

        // --- FARMING ---
        function startFarming() {
            if(userData.isFarming) return;
            userData.isFarming = true;
            userData.lastFarmStart = Date.now();
            saveData();
            updateUI();
        }

        function initFarmingLoop() {
            setInterval(() => {
                if(userData.isFarming) {
                    const elapsed = Date.now() - userData.lastFarmStart;
                    const duration = 24 * 60 * 60 * 1000;
                    if(elapsed >= duration) {
                        userData.isFarming = false;
                        userData.coins += (24 * 60 * settings.rate);
                        saveData();
                        updateUI();
                        stopLeafAnimation();
                        alert("Farming Done!");
                    } else {
                        document.getElementById('progressBar').style.width = (elapsed / duration * 100) + "%";
                        const rem = duration - elapsed;
                        const h = Math.floor(rem/3600000);
                        const m = Math.floor((rem%3600000)/60000);
                        document.getElementById('farmingTimeLeft').innerText = `${h}h ${m}m left`;
                    }
                }
            }, 1000);
        }

        // --- TASKS ---
        async function loadTasks() {
            const snap = await db.collection('tasks').get();
            const list = document.getElementById('taskList');
            list.innerHTML = "";
            snap.forEach(doc => {
                const t = doc.data();
                list.innerHTML += `
                    <div class="glass-card p-4 flex justify-between items-center">
                        <div><p class="font-bold">${t.title}</p><p class="text-xs text-green-400">+${t.reward} Coins</p></div>
                        <button onclick="doTask('${t.link}', '${doc.id}', ${t.reward})" class="bg-indigo-600 px-4 py-2 rounded text-xs">Join</button>
                    </div>`;
            });
        }

        function doTask(link, id, reward) {
            window.open(link, '_blank');
            setTimeout(async () => {
                userData.coins += reward;
                saveData();
                updateUI();
                alert("Reward Claimed!");
            }, 5000);
        }

        // --- WITHDRAW ---
        async function requestWithdrawal() {
            const coins = parseInt(document.getElementById('coinInput').value);
            const addr = document.getElementById('walletAddress').value;
            const method = document.getElementById('withdrawMethod').value;
            
            if(coins > userData.coins || coins < 1000) return alert("Min 1000 coins required!");
            
            userData.coins -= coins;
            await db.collection('withdrawals').add({
                uid: userData.uid,
                name: userData.name,
                coins: coins,
                address: addr,
                method: method,
                status: "Pending",
                date: Date.now()
            });
            saveData();
            updateUI();
            alert("Request Sent!");
        }

        // --- ADMIN FUNCTIONS ---
        async function adminLogin() {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                loadAdminWithdrawals();
            } catch(e) { alert("Wrong credentials!"); }
        }

        async function loadAdminWithdrawals() {
            const snap = await db.collection('withdrawals').where("status", "==", "Pending").get();
            const container = document.getElementById('adminWithdrawals');
            container.innerHTML = "";
            snap.forEach(doc => {
                const w = doc.data();
                container.innerHTML += `
                    <div class="bg-slate-800 p-3 rounded">
                        <p>User: ${w.name} (${w.coins} coins)</p>
                        <p class="text-[10px] text-gray-400">Method: ${w.method} | Addr: ${w.address}</p>
                        <div class="flex gap-2 mt-2">
                            <button onclick="processWithdraw('${doc.id}', 'Approved')" class="bg-green-600 px-2 py-1 rounded">Approve</button>
                            <button onclick="processWithdraw('${doc.id}', 'Rejected')" class="bg-red-600 px-2 py-1 rounded">Reject</button>
                        </div>
                    </div>`;
            });
        }

        async function processWithdraw(id, status) {
            await db.collection('withdrawals').doc(id).update({ status: status });
            loadAdminWithdrawals();
        }

        async function findUser() {
            const uid = document.getElementById('searchUid').value;
            const doc = await db.collection('users').doc(uid).get();
            if(doc.exists) {
                currentEditingUser = doc.data();
                document.getElementById('userDetails').classList.remove('hidden');
                document.getElementById('detName').innerText = `${currentEditingUser.name} | 💰 ${currentEditingUser.coins}`;
                document.getElementById('banBtn').innerText = currentEditingUser.isBanned ? "Unban" : "Ban";
            }
        }

        async function editCoins(amt) {
            currentEditingUser.coins += amt;
            await db.collection('users').doc(currentEditingUser.uid.toString()).update({ coins: currentEditingUser.coins });
            findUser();
        }

        async function toggleBan() {
            currentEditingUser.isBanned = !currentEditingUser.isBanned;
            await db.collection('users').doc(currentEditingUser.uid.toString()).update({ isBanned: currentEditingUser.isBanned });
            findUser();
        }

        async function addTask() {
            const t = document.getElementById('taskTitle').value;
            const l = document.getElementById('taskLink').value;
            const r = parseInt(document.getElementById('taskReward').value);
            await db.collection('tasks').add({ title: t, link: l, reward: r });
            alert("Task Added!");
        }

        async function updateSettings() {
            const meth = document.getElementById('setMethods').value;
            await db.collection('settings').doc('global').set({ methods: meth, rate: 100, conv: 80 });
            alert("Settings Updated!");
        }

        // --- HELPERS ---
        function showTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function logout() { auth.signOut(); location.reload(); }
        async function saveData() { await db.collection('users').doc(userData.uid.toString()).set(userData); }
        
        let leafInterval;
        function startLeafAnimation() {
            leafInterval = setInterval(() => {
                const leaf = document.createElement('div');
                leaf.className = 'leaf'; leaf.innerHTML = '🍁';
                leaf.style.left = Math.random() * 100 + 'vw';
                leaf.style.animationDuration = '3s';
                document.body.appendChild(leaf);
                setTimeout(() => leaf.remove(), 3000);
            }, 400);
        }
        function stopLeafAnimation() { clearInterval(leafInterval); }

        window.onload = initApp;
    </script>
</body>
</html>
